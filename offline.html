<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#141414" />
  <title>离线中 — DarkFlashNav</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #141414;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 32px;
      max-width: 400px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 12px;
      font-weight: 600;
    }
    p {
      font-size: 14px;
      color: #999;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: #1677ff;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #4096ff; }
    .hint { font-size: 12px; color: #555; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">📡</span>
    <h1>网络连接已断开</h1>
    <p>当前处于离线状态，未能加载请求的页面。<br />已访问过的页面可在离线时正常浏览。</p>
    <a class="btn" href="/">返回首页</a>
    <p class="hint">连接网络后刷新即可恢复正常访问</p>
  </div>
  <script>
    window.addEventListener('online', () => { location.href = '/'; });
  </script>
</body>
</html>
