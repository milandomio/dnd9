name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Python deps
        run: pip install pyahocorasick

      - name: Restore DB from previous artifact
        id: restore-db
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: darkfindv5-db
          path: api/data/

      - name: Run data pipeline (skip if DB restored)
        if: steps.restore-db.outcome == 'failure'
        run: python api/main.py

      - name: Upload DB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: darkfindv5-db
          path: api/data/darkfindv5.db
          retention-days: 90
          if-no-files-found: ignore

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Type check
        run: npx tsc --noEmit
        working-directory: web

      - name: Build (SSG)
        run: npm run build
        working-directory: web

      - name: Deploy to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
